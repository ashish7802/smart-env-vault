version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - vault_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/vault.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-prod}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vault_data:
